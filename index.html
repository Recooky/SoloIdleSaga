<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <!-- ★ 手动指定正确的 base ★ -->
    <script>
      (function() {
        var base = document.createElement('base');
        if (window.location.protocol === 'file:') {
          // 本地用 file:// 双击打开
          base.href = './';
        } else if (window.location.hostname.indexOf('github.io') !== -1) {
          // GitHub Pages：提取仓库名（如 /SoloIdleSaga/）
          var match = window.location.pathname.match(/^\/[^\/]+\//);
          base.href = match ? match[0] : '/';
        } else {
          // 本地测试环境（Live Server / localhost）
          base.href = '/';
        }
        document.head.prepend(base);
      })();
    </script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* 强制loading最高优先级样式，最先加载 */
        #loadingMask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            color: #ffd700;
            font-size: 18px;
        }
        .loading-spin {
            width: 50px;
            height: 50px;
            border: 4px solid #2563eb;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
    </style>

    <link rel="stylesheet" href="./css/battle.css">
    <link rel="stylesheet" href="./css/character.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/town.css">

<body>
<!-- 全局Loading遮罩 -->
<div id="loadingMask">

    <div id="progressBarContainer" style="width:80%;max-width:400px;height:8px;background:#1e293b;border-radius:4px;margin-top:16px;overflow:hidden;">

    <div style="background:#ffffff;padding:32px;border-radius:16px;width:90%;max-width:420px;box-shadow:0 10px 40px rgba(0,0,0,0.25);transition:all 0.3s ease;">
        <h3 id="modalTitle" style="margin:0 0 24px 0;font-size:22px;color:#1d2939;font-weight:600;text-align:center;">账号登录</h3>
        
        <div style="margin-bottom:20px;">
            <label style="display:block;margin-bottom:8px;font-size:14px;color:#475467;font-weight:500;">邮箱地址</label>
            <input type="email" id="loginEmail" placeholder="请输入您的注册邮箱"
            style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #d0d5dd;border-radius:10px;font-size:15px;transition:border 0.2s;outline:none;"
            onfocus="this.style.borderColor='#2970c5';this.style.boxShadow='0 0 0 3px rgba(41, 112, 197, 0.1)'"
            onblur="this.style.borderColor='#d0d5dd';this.style.boxShadow='none'">
        </div>

        <div style="margin-bottom:20px;">
            <label style="display:block;margin-bottom:8px;font-size:14px;color:#475467;font-weight:500;">登录密码</label>
            <input type="password" id="loginPwd" placeholder="请输入密码（至少6位）"
            style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #d0d5dd;border-radius:10px;font-size:15px;transition:border 0.2s;outline:none;"
            onfocus="this.style.borderColor='#2970c5';this.style.boxShadow='0 0 0 3px rgba(41, 112, 197, 0.1)'"

    <!-- 大地图选择弹窗（初始隐藏） -->

<!-- 注册 Service Worker（用于缓存图片等静态资源） -->
<!-- 注册 Service Worker（用于缓存图片等静态资源） -->
<script>
  (function() {
    // ★ 预先定义消息处理函数，避免时序问题
    function cacheProgressHandler(event) {
      const data = event.data;
      if (data && data.type === 'CACHE_PROGRESS') {
        const percent = Math.round((data.loaded / data.total) * 100);
        document.getElementById('progressPercent').textContent = percent + '%';
        document.getElementById('progressBarFill').style.width = percent + '%';
        document.getElementById('progressDetail').textContent =
          '已缓存 ' + data.loaded + ' / ' + data.total + ' 张图片';

        if (data.loaded >= data.total) {
          document.getElementById('progressLabel').textContent = '资源加载完成！即将进入游戏...';
          setTimeout(function() {
            document.getElementById('loadingMask').style.display = 'none';
          }, 500);
        }
      }
    }

    // 降级隐藏函数（超时或失败时调用）
    function hideLoadingMask() {
      document.getElementById('progressLabel').textContent = '正在进入游戏...';
      setTimeout(function() {
        document.getElementById('loadingMask').style.display = 'none';
      }, 500);
    }

    if ('serviceWorker' in navigator) {
      // ★ 先挂载监听器（事件监听在注册之前就挂上）
      navigator.serviceWorker.addEventListener('message', cacheProgressHandler);

      // 注册 SW
      navigator.serviceWorker.register('./sw.js')
        .then(function(reg) {
          console.log('SW registered:', reg.scope);

          // ★ 如果 SW 已经激活（第二次加载），说明缓存已存在，直接进入游戏
          if (reg.active) {
            // 给 SW 一点时间检查更新，但为了用户体验，1秒后直接隐藏遮罩
            setTimeout(hideLoadingMask, 1000);
          }

          // 监听更新事件（新版本的 SW 进入 waiting 状态时触发）
          reg.addEventListener('updatefound', function() {
            const installingWorker = reg.installing;
            installingWorker.addEventListener('statechange', function() {
              if (installingWorker.state === 'activated') {
                // 新 SW 已激活，说明版本更新，缓存可能正在构建
                console.log('New SW activated, caching in progress...');
              }
            });
          });
        })
        .catch(function(err) {
          console.warn('SW registration failed:', err.message);
          hideLoadingMask();
        });

      // ★ 超时降级：如果 8 秒内未完成缓存（或未收到任何消息），也显示页面
      setTimeout(function() {
        // 检查是否已隐藏
        var mask = document.getElementById('loadingMask');
        if (mask && mask.style.display !== 'none') {
          console.log('Cache timeout, entering game anyway.');
          hideLoadingMask();
        }
      }, 8000);
    } else {
      // 不支持 SW 的浏览器，直接显示页面
      hideLoadingMask();
    }
  })();
</script>

</body>
</html>
