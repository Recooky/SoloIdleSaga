<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./css/common.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #0f172a;
            color: #fff;
            padding: 0;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }
        /* 顶部云存档栏 */
        .cloud-top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }
        .cloud-top-bar span {
            color: #ffd700;
        }
        .cloud-top-bar select, .cloud-top-bar button {
            padding: 6px 10px;
            border-radius: 4px;
            border: none;
        }
        .save-time-text {
            color: #94a3b8;
            font-size: 13px;
        }
        /* Tab样式 */
        .tab-header {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }
        .tab-btn {
            padding: 10px 20px;
            background: #1e293b;
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
        }
        .tab-btn.active {
            background: #2563eb;
        }
        .tab-panel {
            display: none;
            padding: 20px;
            background: #1e293b;
            border-radius: 0 6px 6px 6px;
        }
        .tab-panel.active {
            display: block;
        }
        /* 战斗面板样式复用之前 */
        .hp-bar-wrap {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .hp-bar {
            height: 100%;
            background: #22c55e;
            transition: width 0.2s;
        }
        .battle-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .log-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .log-box {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
        }
        .log-box h4 {
            color: #ffd700;
            margin-top: 0;
        }
        .log-item {
            font-size: 13px;
            line-height: 1.6;
        }
        .battle-control button {
            padding: 10px 24px;
            margin: 0 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .start-btn {
            background: #16a34a;
            color: #fff;
        }
        .stop-btn {
            background: #dc2626;
            color: #fff;
        }
        /* 角色装备样式 */
        .wrap-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .attr-panel, .equip-panel, .bag-panel {
            background: #0f172a;
            padding: 16px;
            border-radius: 10px;
        }
        .attr-panel h3, .equip-panel h3, .bag-panel h3 {
            color: #ffd700;
            margin-top: 0;
        }
        .attr-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #273549;
        }
        .equip-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        /* 装备栏格子样式 */
        .equip-slot {
            width: 100%;
            height: 80px;
            background: #1e293b;
            border: 1px dashed #64748b;
            border-radius: 6px;
            /* 文字垂直水平居中 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 设置字号 */
            font-size: 15px;
            padding: 4px;
            cursor: pointer;
        }
        .equip-slot.has-equip {
            border-style: solid;
        }
        /* 背包中的装备框样式 */
        .bag-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            /* 新增这一行，拉开上方间距，避免被按钮遮挡 */
            margin-top: 16px;
        }
        /* 背包中的装备框字体样式 */
        .bag-item {
            background: #1e293b;
            padding: 6px;
            min-height: 60px;
            border-radius: 4px;
            cursor: pointer;
            /* 1、设置文字字号，可自行修改 11px / 12px /13px */
            font-size: 15px;
            /* 2、flex 实现文字 水平+垂直居中（多行文字也完美居中） */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        /* 装备详情弹窗美化 */
        .equip-tip-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .equip-tip-box {
            background: linear-gradient(145deg, #161e32, #0f172a);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px 28px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.4);
        }
        /* 左右两栏对比布局，保证高度对齐 */
        .equip-compare-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            min-width: 620px;
        }
        .wear-equip-panel {
            border-right: 1px solid #334155;
            padding-right: 20px;
        }
        .select-equip-panel {
            padding-left: 4px;
        }
        .empty-wear {
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 220px;
        }
        /* 穿戴中标签放到名称后面 */
        .wear-tag {
            display: inline-block;
            background: #22c55e;
            color: #000;
            font-size: 12px;
            padding: 2px 7px;
            border-radius: 4px;
            margin-left: 10px;
            font-weight: bold;
            vertical-align: middle;
        }
        /* 统一左右标题字号、下边框分割线 */
        .equip-tip-box h3,
        .equip-tip-box h4 {
            font-size: 20px;
            margin: 0 0 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #273549;
            display: inline-block;
        }
        .equip-tip-box p {
            line-height: 1.7;
            margin: 8px 0;
            font-size: 14px;
            color: #cbd5e1;
        }
        .equip-tip-box p strong {
            color: #fbbf24;
        }
        /* 按钮统一放在弹窗最下方 */
        .tip-btn-group {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
            grid-column: 1 / -1;
        }
        .tip-btn {
            padding: 9px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .tip-btn:hover {
            transform: translateY(-2px);
        }
        .btn-wear {
            background: #2563eb;
            color: #fff;
        }
        .btn-close {
            background: #475569;
            color: #fff;
        }


        /* 批量销毁弹窗 */
        .batch-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .batch-box {
            background: linear-gradient(145deg, #161e32, #0f172a);
            border:1px solid #334155;
            border-radius:12px;
            padding:24px 28px;
            min-width:420px;
        }
        .batch-box h3 {
            margin-top:0;
            padding-bottom:10px;
            border-bottom:1px solid #273549;
            color:#fff;
        }
        .form-item {
            margin:16px 0;
        }
        .form-item label {
            display:block;
            margin-bottom:8px;
            color:#cbd5e1;
        }
        .ilvl-range input {
            width:80px;
            padding:6px;
            margin:0 8px;
            background:#1e293b;
            border:1px solid #475569;
            color:#fff;
            border-radius:4px;
        }
        .quality-check-group {
            display:flex;
            flex-direction:column;
            gap:8px;
        }
        .quality-check-item {
            display:flex;
            align-items:center;
            gap:8px;
        }
        .quality-check-item span {
            padding:2px 6px;
            border-radius:3px;
        }
        .batch-btn-wrap {
            margin-top:24px;
            display:flex;
            gap:12px;
            justify-content:center;
        }


        /* 稀有度颜色 */
        .rarity-normal { color: #cccccc; }
        .rarity-fine { color: #4ade80; }
        .rarity-rare { color: #3b82f6; }
        .rarity-epic { color: #a855f7; }
        .rarity-legend { color: #f97316; }
        .rarity-myth { color: #ef4444; }
        .rarity-cosmic { color: #facc15; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 998;
        }
        .modal-box {
            background: #1e293b;
            padding: 24px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 顶部右侧云存档栏 -->
    <div class="cloud-top-bar">
        <span id="loginShow">未登录</span>
        <select id="saveSlotSelect">
            <option value="0">存档1</option>
            <option value="1">存档2</option>
            <option value="2">存档3</option>
        </select>
        <button id="uploadSaveBtn">上传存档</button>
        <button id="downloadSaveBtn">下载存档</button>
        <span class="save-time-text">上次云端保存：<span id="lastCloudSaveTime">无</span></span>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="modal" style="display:none">
        <div class="modal-box">
            <h3>账号登录/注册</h3>
            <input type="text" id="accInput" placeholder="账号" style="width:100%;padding:8px;margin:6px 0;">
            <input type="password" id="pwdInput" placeholder="密码" style="width:100%;padding:8px;margin:6px 0;">
            <button id="loginSubmit">登录</button>
        </div>
    </div>

    <!-- Tab切换 -->
    <div class="tab-header">
        <button class="tab-btn active" data-tab="battle">⚔️ 战斗挂机</button>
        <button class="tab-btn" data-tab="character">👤 角色背包</button>
    </div>

    <!-- 战斗面板 -->
    <div class="tab-panel active" id="tab-battle">
        <div class="battle-header">
            <h2>自动挂机战斗</h2>
            <div class="battle-status">
                <span id="stageInfo"></span>
                <span style="margin-left:12px" id="waveInfo"></span>
            </div>
        </div>
        <div class="battle-area">
            <h3>你的角色</h3>
            <div class="hp-bar-wrap">
                <div id="playerHpBar" class="hp-bar" style="width:100%"></div>
            </div>
            <div style="margin:30px 0;">VS</div>
            <h3 id="monsterName">等待战斗开始...</h3>
            <div class="hp-bar-wrap">
                <div id="monsterHpBar" class="hp-bar"></div>
            </div>
        </div>
        <div class="battle-control">
            <button id="startBattleBtn" class="start-btn">开始挂机战斗</button>
            <button id="stopBattleBtn" class="stop-btn">停止战斗</button>
        </div>
        <div class="log-wrap">
            <div class="log-box">
                <h4>战斗攻击日志</h4>
                <div id="battleLog"></div>
            </div>
            <div class="log-box">
                <h4>装备掉落日志</h4>
                <div id="dropLog"></div>
            </div>
        </div>
    </div>

    <!-- 角色背包面板 -->
    <div class="tab-panel" id="tab-character">
        <h2>角色属性 & 装备背包</h2>
        <div class="wrap-row">
            <div class="attr-panel">
                <h3>角色总属性</h3>
                <div id="attrWrap"></div>
            </div>
            <div class="equip-panel">
                <h3>装备穿戴栏</h3>
                <div class="equip-grid" id="equipGrid">
                    <div class="equip-slot" data-pos="weapon">武器</div>
                    <div class="equip-slot" data-pos="helmet">头盔</div>
                    <div class="equip-slot" data-pos="armor">护甲</div>
                    <div class="equip-slot" data-pos="boot">靴子</div>
                    <div class="equip-slot" data-pos="ring">戒指</div>
                    <div class="equip-slot" data-pos="necklace">项链</div>
                </div>
            </div>
        </div>
        <div class="bag-panel">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <h3>背包 <span id="bagCount"></span></h3>
                 <button id="batchDestroyBtn" class="tip-btn btn-close">批量销毁</button>
            </div>
            <div class="bag-grid" id="bagGrid"></div>
        </div>
    </div>
</div>

<script src="./js/main.js"></script>
<script type="module" src="./js/app.js"></script>
</body>
</html>
