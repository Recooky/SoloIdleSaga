<!-- 装备打造模块 -->
<div class="forge-module">
    <!-- 左上角返回 + 标题 -->
    <div class="forge-header">
        <button class="forge-back-btn" id="forgeBackBtn">← </button>
        <span class="forge-title">装备打造</span>
    </div>
    
    <!-- Tab切换 -->
    <div class="forge-tabs" id="forgeTabs">
        <span class="forge-tab active" data-forge-tab="enhance">强化</span>
        <span class="forge-tab" data-forge-tab="reform">改造</span>
        <span class="forge-tab" data-forge-tab="socket">打孔</span>
        <span class="forge-tab" data-forge-tab="gem">镶嵌</span>
    </div>

    <!-- 强化面板 -->
    <div class="forge-panel active" id="forgePanelEnhance">
        <!-- 装备展示区（可滚动） -->
        <div class="forge-compare-wrap">
            <div class="forge-compare-col" id="forgeEquipDisplay">
                <!-- 动态渲染装备卡片 -->
            </div>
        </div>
        
        <!-- 强化操作区（固定底部） -->
        <div class="forge-action-area">
            <div class="forge-action-row success-rate">
                <span class="row-label">
                    <span class="row-label-text">成功率</span>
                    <span class="row-label-colon">：</span>
                </span>
                <span class="row-value"><span id="forgeSuccessRate">100%</span></span>
            </div>
            <div class="forge-action-row gold-cost">
                <span class="row-label">
                    <span class="row-label-text">金币消耗</span>
                    <span class="row-label-colon">：</span>
                </span>
                <span class="row-value"><span id="forgeGoldCost">100</span> / <span id="forgePlayerGold">5000</span></span>
            </div>
            <div class="forge-material-cost" id="forgeMaterialArea" style="display:none;">
                <!-- 由 JS 动态渲染 -->
            </div>
            <button class="forge-enhance-btn" id="forgeEnhanceBtn">强化</button>
        </div>
    </div>

    <!-- 改造面板（不变） -->
    <div class="forge-panel" id="forgePanelReform">
        <div class="forge-coming-soon">
            <div class="forge-coming-soon-inner">
                <div class="coming-soon-icon">🔧</div>
                <div class="coming-soon-text">功能开发中</div>
                <div class="coming-soon-hint">敬请期待</div>
            </div>
        </div>
    </div>

    <!-- 打孔面板（不变） -->
    <div class="forge-panel" id="forgePanelSocket">
        <div class="forge-coming-soon">
            <div class="forge-coming-soon-inner">
                <div class="coming-soon-icon">⛏️</div>
                <div class="coming-soon-text">功能开发中</div>
                <div class="coming-soon-hint">敬请期待</div>
            </div>
        </div>
    </div>

    <!-- 镶嵌面板（不变） -->
    <div class="forge-panel" id="forgePanelGem">
        <div class="forge-coming-soon">
            <div class="forge-coming-soon-inner">
                <div class="coming-soon-icon">💎</div>
                <div class="coming-soon-text">功能开发中</div>
                <div class="coming-soon-hint">敬请期待</div>
            </div>
        </div>
    </div>
</div>
