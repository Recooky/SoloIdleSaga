name: Build WebGame APK
on:
  push:
    branches: [main]
  workflow_dispatch: # 手动一键打包
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装Android SDK & JDK17
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11.0
      - name: Set JDK17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 全局安装Cordova
        run: npm install -g cordova

      - name: 创建Cordova安卓壳项目
        run: |
          cordova create game-apk com.ReSoloIdleSaga.game SoloIdleSaga
          cd game-apk
          # 替换成你的游戏包名、APP名称
          cordova platform add android
          # 安装网络权限（加载外网URL必备）
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-network-information
      
      - name: 配置APP图标
        run: |
          cd game-apk
          mkdir -p res/android
          cp ../../app-icon/icon.png res/android/icon.png
          cat >> config.xml << EOF
          <icon src="res/android/icon.png" density="xxxhdpi" />
          EOF
          cat >> config.xml << EOF
          <access origin="*" />
          <edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application">
              <application android:usesCleartextTraffic="true" />
          </edit-config>
          EOF
      - name: 修改启动页面，自动跳转你的游戏URL
        run: |
          cd game-apk/www
          # 覆盖默认index.html，一打开就跳转你的游戏地址
          cat > index.html << EOF
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>游戏</title>
</head>
<body>
<script>
// ============ 修改这里为你的游戏URL ============
const GAME_URL = "https://recooky.github.io/SoloIdleSaga/";
window.location.href = GAME_URL;
</script>
</body>
</html>
EOF

      - name: 编译无签名调试APK
        run: |
          cd game-apk
          cordova build android --debug

      - name: 上传APK到Actions下载产物
        uses: actions/upload-artifact@v4
        with:
          name: WebGame-Debug-APK
          path: game-apk/platforms/android/app/build/outputs/apk/debug/app-debug.apk
