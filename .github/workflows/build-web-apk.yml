name: Build WebGame APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库全部代码
        uses: actions/checkout@v5

      - name: 配置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11.0

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 导出SDK环境变量
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: 全局安装 Cordova
        run: npm install -g cordova

      - name: 创建Cordova安卓壳项目
        run: |
          cordova create game-apk com.ReSoloIdleSaga.game SoloIdleSaga
          cd game-apk
          cordova platform add android
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-network-information

      - name: 配置APP图标与网络权限
        run: |
          cd game-apk
          mkdir -p res/android
          if [ -f ../../app-icon/icon.png ]; then
            cp ../../app-icon/icon.png res/android/icon.png
            echo '<icon src="res/android/icon.png" density="xxxhdpi" />' >> config.xml
          fi
          echo '<access origin="*" />' >> config.xml
          echo '<edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application">' >> config.xml
          echo '    <application android:usesCleartextTraffic="true" />' >> config.xml
          echo '</edit-config>' >> config.xml

      - name: 内置跳转页面，加载网页游戏
        run: |
          cd game-apk/www
          echo '<!DOCTYPE html>' > index.html
          echo '<html>' >> index.html
          echo '<head><meta charset="utf-8"><title>SoloIdleSaga</title></head>' >> index.html
          echo '<body><script>' >> index.html
          echo 'const GAME_URL = "https://recooky.github.io/SoloIdleSaga/";' >> index.html
          echo 'window.location.href = GAME_URL;' >> index.html
          echo '</script></body></html>' >> index.html

      - name: 编译 Debug 未签名APK
        run: |
          cd game-apk
          cordova build android --debug

      - name: 上传打包完成的APK
        uses: actions/upload-artifact@v4
        with:
          name: WebGame-Debug-APK
          path: game-apk/platforms/android/app/build/outputs/apk/debug/app-debug.apk
