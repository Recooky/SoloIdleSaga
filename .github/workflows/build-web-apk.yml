name: Build WebGame APK
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装系统依赖
        run: sudo apt update && sudo apt install -y unzip wget lib32stdc++6

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 全局安装 Cordova
        run: npm install -g cordova@latest

      # 使用系统自带的 Android SDK，但给当前用户写权限
      - name: 安装 Android SDK 组件
        run: |
          # 设置 SDK 路径
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          
          # 给当前用户添加 SDK 目录的写权限（避免使用 sudo）
          sudo chown -R $USER:$USER $ANDROID_HOME
          
          # 安装所需组件
          $ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          
          # 设置环境变量供后续步骤使用
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          
          echo "Android SDK 组件安装完成"

      - name: 创建 Cordova 项目
        run: |
          cordova create game-apk com.ReSoloIdleSaga.game SoloIdleSaga
          cd game-apk
          cordova platform add android
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-network-information

      - name: 配置图标与网络权限
        run: |
          cd game-apk
          
          # 创建图标目录
          mkdir -p res/android
          if [ -f ../../app-icon/icon.png ]; then
            cp ../../app-icon/icon.png res/android/icon.png
            sed -i '/<widget /a \ \ <icon src="res/android/icon.png" density="xxxhdpi" />' config.xml
          fi
          
          # 在 <widget> 标签内插入访问权限
          sed -i '/<widget /a \ \ <access origin="*" />' config.xml
          
          # 在 <platform name="android"> 内部插入 edit-config
          sed -i '/<platform name="android">/a \ \ \ \ <edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application">\n        <application android:usesCleartextTraffic="true" />\n      <\/edit-config>' config.xml
          
          echo "Config.xml 配置完成"
          cat config.xml

      - name: 写入跳转网页首页
        run: |
          cd game-apk/www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>SoloIdleSaga</title></head><body><script>const GAME_URL = "https://recooky.github.io/SoloIdleSaga/";window.location.href = GAME_URL;</script></body></html>' > index.html

      - name: 编译 APK
        run: |
          cd game-apk
          # 使用系统 SDK
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"
          
          cordova build android --debug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: WebGame-Debug-APK
          path: game-apk/platforms/android/app/build/outputs/apk/debug/app-debug.apk
