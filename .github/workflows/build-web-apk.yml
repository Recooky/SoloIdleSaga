name: Build WebGame APK
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5

      - name: 安装系统依赖
        run: sudo apt update && sudo apt install -y unzip wget lib32stdc++6

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 配置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 全局安装 Cordova
        run: npm install -g cordova@latest

      - name: 创建 Cordova 项目
        run: |
          cordova create game-apk com.ReSoloIdleSaga.game SoloIdleSaga
          cd game-apk
          cordova platform add android
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-network-information

      - name: 配置图标、跨域、明文网络权限
        run: |
          cd game-apk
          mkdir -p res/android
          if [ -f ../../app-icon/icon.png ]; then
            cp ../../app-icon/icon.png res/android/icon.png
            echo '<icon src="res/android/icon.png" density="xxxhdpi" />' >> config.xml
          fi
          echo '<access origin="*" />' >> config.xml
          echo '<edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application"><application android:usesCleartextTraffic="true" /></edit-config>' >> config.xml

      - name: 写入跳转网页的首页
        run: |
          cd game-apk/www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>SoloIdleSaga</title></head><body><script>const GAME_URL = "https://recooky.github.io/SoloIdleSaga/";window.location.href = GAME_URL;</script></body></html>' > index.html

      # 重点：cordova build 会自动下载所需Android SDK，不用手动调用sdkmanager，彻底解决exit 127
      - name: 编译Debug APK
        run: |
          cd game-apk
          cordova build android --debug --verbose

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: WebGame-Debug-APK
          path: game-apk/platforms/android/app/build/outputs/apk/debug/app-debug.apk
