name: Build WebGame APK
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y unzip wget

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 配置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 全局安装 Cordova
        run: npm install -g cordova

      # 原生手动安装 Android SDK，抛弃有bug的第三方action
      - name: 安装 Android SDK Commandline Tools
        run: |
          mkdir -p ~/android-sdk/cmdline-tools
          cd ~/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
          echo "PATH=$PATH" >> $GITHUB_PATH
          # 接受协议并安装编译所需工具
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: 创建Cordova安卓壳项目
        run: |
          cordova create game-apk com.ReSoloIdleSaga.game SoloIdleSaga
          cd game-apk
          cordova platform add android
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-network-information

      - name: 配置APP图标与网络权限
        run: |
          cd game-apk
          mkdir -p res/android
          if [ -f ../../app-icon/icon.png ]; then
            cp ../../app-icon/icon.png res/android/icon.png
            echo '<icon src="res/android/icon.png" density="xxxhdpi" />' >> config.xml
          fi
          echo '<access origin="*" />' >> config.xml
          echo '<edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application">' >> config.xml
          echo '    <application android:usesCleartextTraffic="true" />' >> config.xml
          echo '</edit-config>' >> config.xml

      - name: 内置跳转网页页面
        run: |
          cd game-apk/www
          echo '<!DOCTYPE html>' > index.html
          echo '<html>' >> index.html
          echo '<head><meta charset="utf-8"><title>SoloIdleSaga</title></head>' >> index.html
          echo '<body><script>' >> index.html
          echo 'const GAME_URL = "https://recooky.github.io/SoloIdleSaga/";' >> index.html
          echo 'window.location.href = GAME_URL;' >> index.html
          echo '</script></body></html>' >> index.html

      - name: 编译 Debug APK
        run: |
          cd game-apk
          cordova build android --debug

      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: WebGame-Debug-APK
          path: game-apk/platforms/android/app/build/outputs/apk/debug/app-debug.apk
