name: Build WebGame APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 手动一键打包

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库全部代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11.0

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # 注入安卓SDK环境变量，Cordova编译必备
      - name: 导出SDK环境变量
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: 全局安装 Cordova
        run: npm install -g cordova

      - name: 创建Cordova安卓壳项目
        run: |
          cordova create game-apk com.ReSoloIdleSaga.game SoloIdleSaga
          cd game-apk
          cordova platform add android
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-network-information

      - name: 配置APP图标与网络权限
        run: |
          cd game-apk
          mkdir -p res/android
          # 判断仓库存在图标再复制，不存在不中断打包
          if [ -f ../../app-icon/icon.png ]; then
            cp ../../app-icon/icon.png res/android/icon.png
            echo '<icon src="res/android/icon.png" density="xxxhdpi" />' >> config.xml
          fi
          # 全局允许所有域名、支持HTTP明文访问
          cat >> config.xml <<'EOF'
<access origin="*" />
<edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application">
    <application android:usesCleartextTraffic="true" />
</edit-config>
EOF

      - name: 内置跳转页面，加载网页游戏
        run: |
          cd game-apk/www
          cat > index.html <<'EOF'
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SoloIdleSaga</title>
</head>
<body>
<script>
const GAME_URL = "https://recooky.github.io/SoloIdleSaga/";
window.location.href = GAME_URL;
</script>
</body>
</html>
EOF

      - name: 编译 Debug 未签名APK
        run: |
          cd game-apk
          cordova build android --debug

      - name: 上传打包完成的APK
        uses: actions/upload-artifact@v4
        with:
          name: WebGame-Debug-APK
          path: game-apk/platforms/android/app/build/outputs/apk/debug/app-debug.apk
