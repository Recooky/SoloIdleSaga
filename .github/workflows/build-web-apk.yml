name: Build WebGame APK
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装系统依赖
        run: sudo apt update && sudo apt install -y unzip wget lib32stdc++6

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 全局安装 Cordova
        run: npm install -g cordova@latest

      # 手动安装 Android SDK（最可靠的方式）
      - name: 安装 Android SDK
        run: |
          # 下载命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          
          # 创建标准目录结构
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          
          # 设置环境变量供后续步骤使用
          echo "ANDROID_SDK_ROOT=$PWD/android-sdk" >> $GITHUB_ENV
          echo "$PWD/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$PWD/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$PWD/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH
          
          # 安装 SDK 组件
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          SDKMANAGER=$PWD/android-sdk/cmdline-tools/latest/bin/sdkmanager
          
          # 接受许可证（自动 yes）
          yes | $SDKMANAGER --licenses > /dev/null 2>&1
          
          # 安装所需组件
          $SDKMANAGER "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          
          echo "Android SDK 安装完成"

      - name: 创建 Cordova 项目
        run: |
          cordova create game-apk com.ReSoloIdleSaga.game SoloIdleSaga
          cd game-apk
          cordova platform add android
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-network-information

      - name: 配置图标与网络权限
        run: |
          cd game-apk
          mkdir -p res/android
          if [ -f ../../app-icon/icon.png ]; then
            cp ../../app-icon/icon.png res/android/icon.png
            echo '<icon src="res/android/icon.png" density="xxxhdpi" />' >> config.xml
          fi
          echo '<access origin="*" />' >> config.xml
          echo '<edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application"><application android:usesCleartextTraffic="true" /></edit-config>' >> config.xml

      - name: 写入跳转网页首页
        run: |
          cd game-apk/www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>SoloIdleSaga</title></head><body><script>const GAME_URL = "https://recooky.github.io/SoloIdleSaga/";window.location.href = GAME_URL;</script></body></html>' > index.html

      - name: 编译 APK
        run: |
          cd game-apk
          export ANDROID_SDK_ROOT=$PWD/../android-sdk
          # 增加 Gradle 内存，避免内存不足
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"
          cordova build android --debug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: WebGame-Debug-APK
          path: game-apk/platforms/android/app/build/outputs/apk/debug/app-debug.apk
